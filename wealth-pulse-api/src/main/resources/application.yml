server:
  port: 9090
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100
# Spring
spring:
  application:
    name: litchi-api
  messages:
    basename: message
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
  profiles:
    active: @profileActive@
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      indent_output: true
      fail_on_empty_beans: false
    defaultPropertyInclusion: NON_NULL
    deserialization:
      fail_on_unknown_properties: false
    parser:
      allow_unquoted_control_chars: true
      allow_single_quotes: true
    time-zone: GMT+8

  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:}
      database: 0
      password: ${REDIS_PASSWORD:}
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:}:${MYSQL_PORT:}/wealth_pulse?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: ${MYSQL_USER:}
    password: ${MYSQL_PASSWORD:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html


# token
token:
  header: Authorization
  secret: ${JWT_SECRET:}
  accessExpireTime: 604800

google:
  auth:
    clientId: ${GOOGLE_CLIENTID:}
    clientSecret: ${GOOGLE_CLIENT_SECRET:}
    redirectUri: ${GOOGLE_REDIRECT_URI:}

resend:
  key: ${RESEND_KEY:}
  from: no-reply <no-reply@aicatpaint.com>

cloudflare:
  turnstile:
    enabled: true
    secret: ${CLOUDFLARE_TURNSTILE_SECRET:}
  R2:
    region: auto
    endpoint: ${CLOUDFLARE_R2_ENDPOINT:}
    accessKey: ${CLOUDFLARE_ACCESSKEY:}
    secretKey: ${CLOUDFLARE_SECRETKEY:}
    key: image
    bucket: image
    url: ${CLOUDFLARE_R2_HOST:}

itick:
  token: ${ITICK_TOKEN:}
  url: https://api.itick.org/symbol/v2/holidays?code=HK
rpc:
  python:
    url: ${PYTHON_API_HOST:}
    clientId: ${PYTHON_CLIENT_ID:}
    clientSecret: ${PYTHON_SECRET:}
