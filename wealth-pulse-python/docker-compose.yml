version: '3.8'
services:
  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wealth-pulse-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: wealth_user
      DB_PASSWORD: wealth_password
      DB_NAME: wealth_pulse
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_data_center
      REDIS_DB: 0
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "false"
      SCHEDULER_ENABLED: "true"
      MARKET_DATA_UPDATE_INTERVAL: 300
      LOG_LEVEL: INFO
      STOCK_DATA_PROVIDER: "akshare"
      API_SECRET_KEY: "your-secret-key-change-this-in-production"
      API_CLIENT_ID: "wealth-pulse-java"
      API_CLIENT_SECRET: "wealth-pulse-client-secret"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
